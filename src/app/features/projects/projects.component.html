<!-- src/app/features/projects/projects.component.html -->
<div class="page-enter" style="padding:3.5rem 0 6rem">
  <div class="container">

    <div class="section-header mb-4">
      <span class="section-label">Portfolio</span>
      <h1 class="section-title">Projects</h1>
      <div class="section-divider"></div>
    </div>

    <div class="admin-hint glass-card p-3 mb-4 d-flex align-items-center gap-2">
      <i class="bi bi-info-circle text-teal"></i>
      <span style="font-size:0.82rem;color:var(--text-sub)">
        Projects are managed via the <a routerLink="/admin/projects" class="text-teal">Admin Panel</a>.
        The entries below are loaded from the API — add more from the admin dashboard.
      </span>
    </div>

    <div class="row g-4">
      <div class="col-lg-4 col-md-6" *ngFor="let p of projects(); trackBy: trackByProject">
        <div class="project-card">
          <div class="project-thumb">
            <i class="bi {{ p.iconClass }}"></i>
          </div>
          <div class="project-body">
            <h3 class="project-title">{{ p.title }}</h3>
            <p class="project-desc">{{ p.description }}</p>
            <div class="project-tags mb-3">
              <span class="skill-tag" *ngFor="let tag of p.tags">{{ tag }}</span>
            </div>
            <div class="d-flex gap-2 mt-auto">
              <a *ngIf="p.liveUrl" [href]="p.liveUrl" target="_blank" class="btn-crystal btn-sm">
                <i class="bi bi-box-arrow-up-right"></i>Live
              </a>
              <a *ngIf="p.repoUrl" [href]="p.repoUrl" target="_blank" class="btn-crystal btn-amber btn-sm">
                <i class="bi bi-github"></i>Code
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Add new card -->
      <div class="col-lg-4 col-md-6">
        <div class="project-card add-card" routerLink="/admin/projects" style="cursor:pointer">
          <div class="add-inner">
            <i class="bi bi-plus-circle"></i>
            <p>Add via Admin Panel</p>
            <span style="font-size:0.75rem;color:var(--text-sub)">Manage your projects from the admin dashboard</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
