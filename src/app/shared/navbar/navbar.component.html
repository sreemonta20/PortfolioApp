<!-- src/app/shared/navbar/navbar.component.html -->
<nav class="navbar-wrap" [class.scrolled]="isScrolled()">
  <div class="container">
    <div class="nav-inner">

      <!-- Brand -->
      <a class="brand" routerLink="/profile">
        SB<span class="brand-dot">.</span>
      </a>

      <!-- Desktop Nav -->
      <ul class="nav-links desktop-nav">
        <li *ngFor="let link of navLinks">
          <a
            class="nav-link"
            [class.active]="isActive(link.path)"
            [routerLink]="link.path"
          >
            <i class="bi {{ link.icon }}"></i>
            {{ link.label }}
          </a>
        </li>
        <li>
          <a class="btn-crystal btn-sm" routerLink="/admin">
            <i class="bi bi-shield-lock"></i> Admin
          </a>
        </li>
      </ul>

      <!-- Hamburger -->
      <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="menuOpen()">
    <div class="container">
      <ul class="mobile-nav-links">
        <li *ngFor="let link of navLinks">
          <a class="mobile-nav-link" [class.active]="isActive(link.path)" [routerLink]="link.path">
            <i class="bi {{ link.icon }}"></i>{{ link.label }}
          </a>
        </li>
        <li>
          <a class="btn-crystal btn-sm w-100 justify-content-center mt-2" routerLink="/admin">
            <i class="bi bi-shield-lock"></i> Admin Panel
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<!-- Spacer so content doesn't hide under sticky navbar -->
<div class="navbar-spacer"></div>
